<!DOCTYPE html>
<html>
<head>
<title>World Mobile Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial;
margin:0;
background:#f2f2f2;
text-align:center;
}

header{
background:black;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.brands{
margin:15px;
}

.brand-btn{
padding:10px 15px;
margin:5px;
border:none;
background:black;
color:white;
cursor:pointer;
border-radius:5px;
}

#phoneList{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:10px;
}

.phone{
background:white;
width:220px;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.phone img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
}

.phone h3{
font-size:16px;
margin:10px 0 5px;
}

.phone p{
font-size:13px;
color:gray;
}

.phone a{
display:inline-block;
margin-top:8px;
padding:6px 10px;
background:black;
color:white;
text-decoration:none;
border-radius:5px;
font-size:13px;
}
</style>
</head>

<body>

<header>🌍 World Mobile Hub</header>

<div class="brands">
<button class="brand-btn" onclick="loadBrand('iphone')">Apple</button>
<button class="brand-btn" onclick="loadBrand('samsung')">Samsung</button>
<button class="brand-btn" onclick="loadXiaomi()">Xiaomi</button>
</div>

<div id="phoneList"></div>

<script>

let phoneList = document.getElementById("phoneList");

/* ---------- API Brands ---------- */

function loadBrand(brand){

phoneList.innerHTML="Loading...";

fetch(`https://dummyjson.com/products/search?q=${brand}`)
.then(res=>res.json())
.then(data=>{

phoneList.innerHTML="";

data.products.slice(0,8).forEach(p=>{

let amazonLink=`https://www.amazon.in/s?k=${p.title.replace(/ /g,"+")}`;

let div=document.createElement("div");
div.className="phone";

div.innerHTML=`
<img src="${p.thumbnail}">
<h3>${p.title}</h3>
<p>${p.description.substring(0,60)}...</p>
<a href="${amazonLink}" target="_blank">Buy on Amazon</a>
`;

phoneList.appendChild(div);

});

});

}

/* ---------- Xiaomi Manual ---------- */

function loadXiaomi(){

phoneList.innerHTML="";

let phones = [

{
name:"Xiaomi 13 Pro",
image:"https://source.unsplash.com/400x500/?xiaomi-13-pro",
desc:"50MP Camera | Snapdragon 8 Gen 2"
},

{
name:"Redmi Note 13 Pro",
image:"https://source.unsplash.com/400x500/?redmi-note-13",
desc:"200MP Camera | AMOLED Display"
},

{
name:"Poco X6 Pro",
image:"https://source.unsplash.com/400x500/?poco-x6",
desc:"Dimensity Processor | 120Hz Display"
},

{
name:"Xiaomi 12",
image:"https://source.unsplash.com/400x500/?xiaomi-12",
desc:"Snapdragon 8 Gen 1 | 120Hz AMOLED"
}

];

phones.forEach(p=>{

let amazonLink=`https://www.amazon.in/s?k=${p.name.replace(/ /g,"+")}`;

let div=document.createElement("div");
div.className="phone";

div.innerHTML=`
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<a href="${amazonLink}" target="_blank">Buy on Amazon</a>
`;

phoneList.appendChild(div);

});

}

</script>

</body>
</html>
