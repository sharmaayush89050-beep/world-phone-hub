<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Phone Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

header{
background:#00c3ff;
padding:20px;
font-size:24px;
font-weight:bold;
}

#searchBox{
margin:20px;
padding:10px;
width:250px;
border-radius:5px;
border:none;
}

#phone-list{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.phone{
background:#1c1c1c;
margin:15px;
padding:20px;
border-radius:10px;
width:250px;
}

.phone img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.phone a{
display:inline-block;
margin-top:10px;
padding:8px 15px;
background:#00c3ff;
color:black;
text-decoration:none;
border-radius:5px;
font-weight:bold;
}

footer{
background:#000;
padding:15px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
📱 WORLD PHONE HUB
</header>

<input type="text" id="searchBox" placeholder="Search Phone...">

<div id="phone-list"></div>

<footer>
© 2026 World Phone Hub | Ayush Sharma
</footer>

<script>

const phoneList = document.getElementById("phone-list");
const searchBox = document.getElementById("searchBox");

async function fetchPhones(query="iphone"){
phoneList.innerHTML = "Loading...";

try{
let res = await fetch(`https://dummyjson.com/products/search?q=${query}`);
let data = await res.json();

phoneList.innerHTML = "";

data.products.forEach(product => {

let div = document.createElement("div");
div.className = "phone";

div.innerHTML = `
<img src="${product.thumbnail}">
<h3>${product.title}</h3>
<p>${product.description.substring(0,60)}...</p>
<a href="#">Buy Now</a>
`;

phoneList.appendChild(div);

});

}catch(err){
phoneList.innerHTML = "Failed to load data";
}
}

fetchPhones();

searchBox.addEventListener("keyup", () => {
let value = searchBox.value.trim();
if(value.length > 2){
fetchPhones(value);
}
});

</script>

</body>
</html>
