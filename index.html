<!DOCTYPE html>
<html>
<head>
  <title>World Mobile Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family: Arial;
      background:#111;
      color:white;
      text-align:center;
    }

    h1{
      margin-top:20px;
    }

    button{
      padding:10px 20px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
      font-weight:bold;
    }

    .brand-btn{
      background:#ff9800;
      color:black;
    }

    .phone{
      background:#222;
      margin:15px;
      padding:15px;
      border-radius:10px;
    }

    img{
      width:200px;
      height:250px;
      object-fit:cover;
      border-radius:10px;
    }

    a{
      display:inline-block;
      margin-top:10px;
      padding:8px 15px;
      background:red;
      color:white;
      text-decoration:none;
      border-radius:5px;
    }
  </style>
</head>
<body>

<h1>World Mobile Hub</h1>

<button class="brand-btn" onclick="loadBrand('Apple')">Apple</button>
<button class="brand-btn" onclick="loadBrand('Samsung')">Samsung</button>

<div id="phoneList"></div>

<script>

const API_KEY = "MhmvsW2tPrYRjI9uiasEeXUE44WJoN8kBTsheZwm";

let phoneList = document.getElementById("phoneList");

window.allPhones = [
  { brand: "Apple", name: "iPhone 15", os: "iOS" },
  { brand: "Apple", name: "iPhone 14", os: "iOS" },
  { brand: "Samsung", name: "Galaxy S23", os: "Android" },
  { brand: "Samsung", name: "Galaxy A54", os: "Android" }
];

async function loadBrand(brand){

  phoneList.innerHTML = "Loading...";

  let filtered = window.allPhones.filter(phone => phone.brand === brand);

  phoneList.innerHTML = "";

  for (let phone of filtered){

    let imageUrl = await fetchImage(phone.name);

    let amazonLink = `https://www.amazon.in/s?k=${phone.name.replace(/ /g,"+")}`;

    let div = document.createElement("div");
    div.className = "phone";

    div.innerHTML = `
      <img src="${imageUrl}">
      <h3>${phone.name}</h3>
      <p>OS: ${phone.os}</p>
      <a href="${amazonLink}" target="_blank">Buy on Amazon</a>
    `;

    phoneList.appendChild(div);
  }
}

async function fetchImage(query){
  try{
    const response = await fetch(
      `https://api.api-ninjas.com/v1/imagesearch?query=${query} smartphone`,
      {
        headers: { 'X-Api-Key': API_KEY }
      }
    );

    const data = await response.json();

    if(data.length > 0){
      return data[0].image;
    } else {
      return "https://via.placeholder.com/200x250?text=No+Image";
    }

  } catch(error){
    return "https://via.placeholder.com/200x250?text=Error";
  }
}

</script>

</body>
</html>
