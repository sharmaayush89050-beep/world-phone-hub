<!DOCTYPE html>
<html>
<head>
<title>World Mobile Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial;
margin:0;
background:#f2f2f2;
text-align:center;
}

header{
background:black;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.brands{
margin:15px;
}

.brand-btn{
padding:10px 15px;
margin:5px;
border:none;
background:black;
color:white;
cursor:pointer;
border-radius:5px;
}

#phoneList{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:10px;
}

.phone{
background:white;
width:220px;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.phone img{
width:100%;
height:220px;
object-fit:contain;
background:#fff;
border-radius:8px;
}

.phone h3{
font-size:16px;
margin:10px 0 5px;
}

.phone a{
display:inline-block;
margin-top:8px;
padding:6px 10px;
background:black;
color:white;
text-decoration:none;
border-radius:5px;
font-size:13px;
}
</style>
</head>

<body>

<header>🌍 World Mobile Hub</header>

<div class="brands">
<button class="brand-btn" onclick="loadApple()">Apple</button>
<button class="brand-btn" onclick="loadSamsung()">Samsung</button>
<button class="brand-btn" onclick="loadPoco()">Poco</button>
<button class="brand-btn" onclick="loadRealme()">Realme</button>
</div>

<div id="phoneList"></div>

<script>

let phoneList = document.getElementById("phoneList");

function createCard(name,image,keyword){

let amazonLink=`https://www.amazon.in/s?k=${keyword.replace(/ /g,"+")}`;

let div=document.createElement("div");
div.className="phone";

div.innerHTML=`
<img src="${image}">
<h3>${name}</h3>
<a href="${amazonLink}" target="_blank">Buy on Amazon</a>
`;

phoneList.appendChild(div);
}

/* Apple */
function loadApple(){
phoneList.innerHTML="";
createCard("iPhone 15",
"https://upload.wikimedia.org/wikipedia/commons/4/4f/IPhone_15.png",
"iPhone 15");
}

/* Samsung */
function loadSamsung(){
phoneList.innerHTML="";
createCard("Samsung Galaxy S23",
"https://upload.wikimedia.org/wikipedia/commons/5/5f/Samsung_Galaxy_S23.png",
"Samsung Galaxy S23");
}

/* Poco */
function loadPoco(){
phoneList.innerHTML="";
createCard("Poco X5 Pro",
"https://upload.wikimedia.org/wikipedia/commons/0/0b/Smartphone.jpg",
"Poco X5 Pro");
}

/* Realme */
function loadRealme(){
phoneList.innerHTML="";
createCard("Realme 11 Pro",
"https://upload.wikimedia.org/wikipedia/commons/0/0b/Smartphone.jpg",
"Realme 11 Pro");
}

</script>

</body>
</html>
